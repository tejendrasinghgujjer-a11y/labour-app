<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-black text-slate-300 font-sans min-h-screen">

    <div id="auth-screen" class="fixed inset-0 bg-black z-[100] flex items-center justify-center p-6">
        <div class="w-full max-w-sm">
            <h1 class="text-white text-3xl font-black italic mb-2">MANAGER <span class="text-blue-500">VAULT</span></h1>
            <p class="text-xs text-slate-500 uppercase tracking-widest mb-8">Authorization Required</p>
            <input type="password" id="passcode" placeholder="ENTER PASSCODE" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl text-white mb-4 outline-none focus:border-blue-500 transition-all text-center tracking-[1em]">
            <button onclick="checkAuth()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold hover:bg-blue-700">ACCESS DASHBOARD</button>
        </div>
    </div>

    <div id="dashboard" class="hidden p-6 max-w-lg mx-auto">
        <header class="mb-10 flex justify-between items-end">
            <div>
                <p class="text-[10px] font-bold text-blue-500 uppercase tracking-[0.3em]">Control Center</p>
                <h2 class="text-2xl font-black text-white italic">DASHBOARD</h2>
            </div>
            <div class="text-right">
                <span id="live-indicator" class="text-[10px] font-black text-green-500 uppercase tracking-widest">● System Live</span>
            </div>
        </header>

        <div class="bg-slate-900/50 border border-slate-800 p-6 rounded-[2.5rem] mb-6">
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Market Rate Setting</p>
            <div class="flex items-center gap-4 mb-6">
                <span class="text-4xl font-light text-slate-500">₹</span>
                <input type="number" id="base-rate" class="bg-transparent text-5xl font-black text-white outline-none w-full" placeholder="000">
            </div>
            <button onclick="updateRate()" class="w-full bg-white text-black p-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-blue-500 hover:text-white transition-all">Update Live Rate</button>
        </div>

        <div class="bg-slate-900/50 border border-slate-800 p-6 rounded-[2.5rem] mb-6">
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Broadcast Alert</p>
            <textarea id="broadcast-text" class="w-full bg-black/40 border border-slate-800 p-4 rounded-xl text-white text-sm mb-4 outline-none h-24" placeholder="Type emergency message..."></textarea>
            <button onclick="updateMessage()" class="w-full bg-slate-800 text-white p-3 rounded-xl font-bold text-[10px] uppercase">Update Alert</button>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="setStatus('online')" class="bg-blue-600 text-white p-4 rounded-2xl font-black text-[10px] uppercase">Go Online</button>
            <button onclick="setStatus('maintenance')" class="bg-slate-800 text-white p-4 rounded-2xl font-black text-[10px] uppercase">Maintenance</button>
        </div>
    </div>

    <script>
        // TERA ASLI CONFIG YAHAN HAI
        const firebaseConfig = {
            apiKey: "AIzaSyCsrZ7Hxg665Kx83jt-4OZsexmZ--iTaNI",
            authDomain: "labourapp-9b954.firebaseapp.com",
            projectId: "labourapp-9b954",
            storageBucket: "labourapp-9b954.firebasestorage.app",
            messagingSenderId: "782574249278",
            appId: "1:782574249278:web:a6d282ef10174a3196786f",
            measurementId: "G-HWB45HTS4K"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // Auth Check
        function checkAuth() {
            const pin = document.getElementById('passcode').value;
            if(pin === "786786") {
                auth.signInAnonymously().then(() => {
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                    loadCurrentData();
                });
            } else {
                alert("WRONG PASSCODE");
            }
        }

        function loadCurrentData() {
            db.collection("settings").doc("rates").onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('base-rate').value = data.base_rate || "";
                    document.getElementById('broadcast-text').value = data.message || "";
                }
            });
        }

        function updateRate() {
            const rate = document.getElementById('base-rate').value;
            db.collection("settings").doc("rates").set({ base_rate: rate }, { merge: true })
            .then(() => alert("Rate Updated Live!"));
        }

        function updateMessage() {
            const msg = document.getElementById('broadcast-text').value;
            db.collection("settings").doc("rates").set({ message: msg }, { merge: true })
            .then(() => alert("Alert Sent!"));
        }

        function setStatus(status) {
            db.collection("settings").doc("rates").set({ status: status }, { merge: true })
            .then(() => alert("System status: " + status));
        }
    </script>
</body>
</html>
